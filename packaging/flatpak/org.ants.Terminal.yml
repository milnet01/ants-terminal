# Flatpak manifest for Ants Terminal.
#
# Build locally:
#     flatpak-builder --install --user --force-clean \
#         build-flatpak packaging/flatpak/org.ants.Terminal.yml
# Run:
#     flatpak run org.ants.Terminal
# Lint:
#     flatpak run --command=flatpak-builder-lint org.flatpak.Builder \
#         manifest packaging/flatpak/org.ants.Terminal.yml
#
# Targets org.kde.Platform//6.7 — the KDE SDK brings cmake, ninja, and all
# Qt6 components the build needs (Core, Gui, Widgets, Network, OpenGL,
# OpenGLWidgets, DBus). Qt6.7 also clears the CMakeLists.txt 6.2 floor.
#
# Host shell. `src/ptyhandler.cpp` detects FLATPAK_ID / /.flatpak-info in
# the forked child and exec's the user's shell via `flatpak-spawn --host`,
# so bash/zsh/fish run OUTSIDE the sandbox with the user's real $PATH,
# tools, and filesystem. That is the only workable PTY model inside a
# Flatpak — the sandbox's minimal runtime doesn't have the user's shell,
# and even if it did, running commands under the sandbox's namespaces
# would cut the user off from the tools they expect. The wire-through
# requires the --talk-name=org.freedesktop.Flatpak finish-arg below to
# reach the host helper daemon.
#
# Lua plugins. The Lua 5.4 interpreter is built in-manifest as a
# dedicated `lua` module before `ants-terminal` (see below) so
# PluginManager has the same plugin surface inside the sandbox as the
# native packages. org.kde.Sdk does not ship `lua54-devel`, and
# flathub/shared-modules does not carry a Lua 5.4 entry today, so an
# in-manifest archive module is the pragmatic path. The
# `x-checker-data` stanza on that module lets Flathub's
# flatpak-external-data-checker refresh the tarball sha256
# automatically on each Lua 5.4.x point release — no manual hash
# churn per bump.

id: org.ants.Terminal

runtime: org.kde.Platform
runtime-version: '6.7'
sdk: org.kde.Sdk

command: ants-terminal

finish-args:
  # ── Display ─────────────────────────────────────────────────────────
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  # ── Host integration ────────────────────────────────────────────────
  # `flatpak-spawn --host` (ptyhandler.cpp) for the user's shell.
  - --talk-name=org.freedesktop.Flatpak
  # Desktop portals: global shortcuts (Quake-mode binding), file
  # dialogs, notifications. The * form is standard for portal access
  # and matches other KDE-based Flatpaks (Konsole, Kate).
  - --talk-name=org.freedesktop.portal.*
  # OSC 9 / OSC 777 desktop notifications.
  - --talk-name=org.freedesktop.Notifications
  # ── Network ─────────────────────────────────────────────────────────
  # AI endpoint (HTTPS), SSH bookmarks (outgoing), URL handling (OSC 8).
  - --share=network
  # ── Storage ─────────────────────────────────────────────────────────
  # Config + data live under standard XDG paths. `:create` ensures the
  # directories exist on first launch.
  - --filesystem=xdg-config/ants-terminal:create
  - --filesystem=xdg-data/ants-terminal:create
  # Host $HOME: session restore needs to read the files the user
  # opens/saves in the terminal, and `flatpak-spawn --host` inherits
  # the host's cwd view. Required for a functional terminal.
  - --filesystem=home

modules:
  # Lua 5.4 — plugin system runtime. Built first so the ants-terminal
  # CMake configure step finds headers under /app/include and the
  # static library at /app/lib/liblua.a (CMake's FindLua module picks
  # up both). Using `linux-noreadline` instead of the default `linux`
  # target avoids pulling a readline dependency into the sandbox; the
  # terminal only links liblua.a, it does not ship the Lua REPL
  # binary. `-fPIC` is required because liblua.a is linked into the
  # ants-terminal executable which itself is PIE.
  - name: lua
    buildsystem: simple
    build-commands:
      - make linux-noreadline MYCFLAGS="-fPIC" -j ${FLATPAK_BUILDER_N_JOBS:-1}
      - make install INSTALL_TOP=/app
    sources:
      - type: archive
        url: https://www.lua.org/ftp/lua-5.4.7.tar.gz
        sha256: 9fbf5e28ef86c69858f6d3d34eccc32e911c1a28b4120ff3e84aaa70cfbf1e30
        # Flathub's flatpak-external-data-checker tracks upstream Lua
        # releases at https://www.lua.org/ftp/ and refreshes the URL
        # + sha256 fields above on 5.4.x point bumps. CI opens a PR
        # against the Flathub repo; we review and merge. No manual
        # hash churn per Lua release.
        x-checker-data:
          type: html
          url: https://www.lua.org/ftp/
          version-pattern: lua-(5\.4\.\d+)\.tar\.gz
          url-template: https://www.lua.org/ftp/lua-$version.tar.gz

  - name: ants-terminal
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_INSTALL_PREFIX=/app
      # Tests execute ctest-via-CMakeLists (shell fixture + feature
      # binaries). Shell-harness tests assume a GNU sed / grep on PATH
      # which the KDE SDK provides; the source-grep feature tests
      # require no runtime services. Kept on so the Flatpak CI stage
      # runs the same regression suite the other recipes do.
      - -DANTS_TESTS=ON
    sources:
      - type: dir
        # flatpak-builder invokes from this manifest's directory; the
        # project root is two levels up (packaging/flatpak/ → ./).
        path: ../..
