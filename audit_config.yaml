project:
  name: Ants
  root: .
  language: cpp
  source_dirs:
  - build-test/
  - src/
  shader_dirs: []
  shader_glob: '*.glsl'
  source_extensions:
  - .cpp
  - .h
  - .hpp
  - .cxx
  - .cc
  exclude_dirs:
  - external/
  - build/
  - .git/
  - .claude/
  - third_party/
  - vendor/
  - deps/
  - node_modules/
build:
  system: cmake
  build_dir: build
  configure_cmd: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
  build_cmd: cmake --build build 2>&1
  warning_regex: 'warning:|error:'
  test_cmd: cd build && ctest --output-on-failure 2>&1
  sanitizer:
    enabled: false
static_analysis:
  cppcheck:
    enabled: true
    args: --enable=all --std=c++20 --suppress=missingIncludeSystem --suppress=unusedFunction
  clang_tidy:
    enabled: true
    checks: bugprone-*,performance-*,modernize-*
patterns:
  memory_safety:
  - name: raw_new
    pattern: \bnew\s+\w+
    file_glob: '*.cpp,*.h'
    severity: high
    description: "Raw new \u2014 should use smart pointers"
    exclude_pattern: placement new|nothrow
    skip_comments: true
  - name: raw_delete
    pattern: \bdelete\s+
    file_glob: '*.cpp,*.h'
    severity: high
    description: "Raw delete \u2014 should use smart pointers"
    skip_comments: true
  - name: null_macro
    pattern: \bNULL\b
    file_glob: '*.cpp,*.h'
    severity: low
    description: "NULL macro \u2014 use nullptr"
  - name: unsafe_c_string
    pattern: \b(strcpy|strcat|sprintf|gets)\b
    file_glob: '*.cpp,*.h'
    severity: high
    description: Unsafe C string function
    skip_comments: true
  - name: c_style_cast
    pattern: \(\s*(int|float|double|char|void|unsigned|long|short|size_t|uint\d+_t|int\d+_t)\s*\*?\s*\)
    file_glob: '*.cpp,*.h'
    severity: medium
    description: "C-style cast \u2014 use static_cast/reinterpret_cast"
  performance:
  - name: std_endl
    pattern: std::endl
    file_glob: '*.cpp,*.h'
    severity: low
    description: "std::endl flushes stream \u2014 use '\\n'"
  - name: shared_ptr
    pattern: std::shared_ptr
    file_glob: '*.cpp,*.h'
    severity: low
    description: "shared_ptr \u2014 verify unique_ptr not sufficient"
  code_quality:
  - name: todo_fixme
    pattern: \b(TODO|FIXME|HACK|WORKAROUND|XXX)\b
    file_glob: '*.cpp,*.h'
    severity: info
    description: Deferred work marker
  - name: empty_catch
    pattern: catch\s*\([^)]*\)\s*\{\s*\}
    file_glob: '*.cpp,*.h'
    severity: medium
    description: "Empty catch block \u2014 silently swallowed error"
changes:
  base_ref: HEAD~1
tier4:
  gpu_resource_pattern: GLuint\s+m_
  event_subscribe_pattern: subscribe<
  event_unsubscribe_pattern: unsubscribe
  complexity_threshold: 500
research:
  enabled: true
  cache_dir: .audit_cache
  cache_ttl_days: 7
  max_results_per_query: 3
  topics:
  - query: CVE Qt6 vulnerability
  - query: CVE PkgConfig vulnerability
  - query: CVE Lua 5.4 vulnerability
  custom_queries: []
report:
  output_path: docs/AUTOMATED_AUDIT_REPORT.md
  max_findings_per_category: 100
  include_json_blocks: true
  include_token_estimate: true
tiers:
- 1
- 2
- 3
- 4
- 5
