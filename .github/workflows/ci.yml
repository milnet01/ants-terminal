# Minimal CI: compile-check + run the audit-rule regression suite.
# Runs on push to main and on every PR so regressions to the rule regexes
# are caught before merge.
#
# Hardening notes (matches audit STANDARDS.md §Supply chain):
#   • `permissions: contents: read` — override the overbroad default token.
#   • actions/checkout pinned by 40-char SHA with `# v4.2.2` for humans.
#     Tags are mutable; SHAs are not (cf. tj-actions/changed-files, 2025).
#   • No secrets referenced; no `pull_request_target`; no self-hosted runners.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Qt6 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-base-dev-tools \
            libqt6opengl6-dev libqt6openglwidgets6 \
            liblua5.4-dev cppcheck

      - name: Configure (Release + warnings-as-warnings)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: "Run cppcheck (audit rule: Qt-aware static analysis)"
        run: |
          cppcheck --enable=all --std=c++20 --library=qt \
                   --suppress=missingIncludeSystem \
                   --suppress=unusedFunction \
                   --suppress=unknownMacro \
                   --suppress=normalCheckLevelMaxBranches \
                   --error-exitcode=0 \
                   -I src src/

      # Packaging artefact validation (H2 — distribution readiness).
      # Runs the same validators distro packagers invoke during package
      # review, so schema drift in the desktop entry or AppStream metainfo
      # fails CI instead of landing in a release tarball.
      - name: Install AppStream + desktop-file validators
        run: |
          sudo apt-get install -y --no-install-recommends \
            appstream desktop-file-utils

      - name: Validate AppStream metainfo
        run: |
          appstreamcli validate --explain \
            packaging/linux/org.ants.Terminal.metainfo.xml

      - name: Validate desktop entry
        run: |
          desktop-file-validate packaging/linux/org.ants.Terminal.desktop

  # Dedicated ASan + UBSan build. Smoke-tests the binary under sanitizers
  # so initialization-path bugs (config load, command-line parsing, Qt setup)
  # are caught on every push. Runtime coverage today is narrow — `--version`
  # exits before GUI bring-up — but the compile itself validates that no code
  # path is sanitizer-incompatible, and `QT_QPA_PLATFORM=offscreen` means we
  # can broaden later without a display.
  #
  # detect_leaks=0: Qt initializes global singletons with bounded lifetimes
  # that look like leaks to LSan on a fast-exit path. Re-enable once we
  # have a real unit-test suite that does full app lifecycle.
  build-asan:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install Qt6 + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-base-dev-tools \
            libqt6opengl6-dev libqt6openglwidgets6 \
            liblua5.4-dev

      - name: Configure (Debug + ASan/UBSan)
        run: cmake -S . -B build-asan -G Ninja -DCMAKE_BUILD_TYPE=Debug -DANTS_SANITIZERS=ON

      - name: Build
        run: cmake --build build-asan --parallel

      - name: Run audit-rule tests under sanitizers
        working-directory: build-asan
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: ctest --output-on-failure

      - name: Smoke-test binary init paths
        working-directory: build-asan
        env:
          QT_QPA_PLATFORM: offscreen
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
        run: |
          ./ants-terminal --version
          ./ants-terminal --help
